<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secret Love Page</title>

<style>
body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fbc2eb);
  animation: bg 6s infinite alternate;
}

@keyframes bg {
  0% {filter: hue-rotate(0deg);}
  100% {filter: hue-rotate(40deg);}
}

/* Floating & Falling Hearts */
.heart {
  position: absolute;
  color: rgba(255,255,255,0.7);
  z-index: 1;
  pointer-events: none;
}
.float-up { animation: floatUp 7s linear infinite; }
/* 🎈 ပိုပြီး ဖြည်းဖြည်းချင်း ကျလာအောင် ညှိထားတဲ့ falling animation */
.fall-down { animation: fallDown 8s linear infinite; }

@keyframes floatUp {
  0% {transform: translateY(100vh) scale(0.5); opacity: 0;}
  10% {opacity: 1;}
  100% {transform: translateY(-10vh) scale(1.2); opacity: 0;}
}

@keyframes fallDown {
  0% {transform: translateY(-10vh) rotate(0deg); opacity: 1;}
  100% {transform: translateY(110vh) rotate(360deg); opacity: 0;}
}

.box {
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  padding: 30px 20px;
  border-radius: 20px;
  text-align: center;
  width: 90%;
  max-width: 340px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  z-index: 10;
  border: 1px solid rgba(255,255,255,0.2);
  max-height: 90vh;
  overflow-y: auto;
}

/* Scrollbar ကို ဖျောက်ထားခြင်း */
.box::-webkit-scrollbar {
  display: none;
}

h2 { color: white; margin-top: 0; }

input {
  padding: 12px;
  width: 90%;
  border: none;
  border-radius: 10px;
  margin-top: 10px;
  text-align: center;
  font-size: 16px;
  outline: none;
}

button {
  margin-top: 15px;
  padding: 10px 25px;
  border: none;
  border-radius: 10px;
  background: #ff4d6d;
  color: white;
  font-weight: bold;
  font-size: 16px;
  cursor: pointer;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.message-container {
  display: none;
  margin-top: 15px;
}

/* 💌 Interactive Envelope Style */
.envelope-wrapper {
  margin: 20px auto;
  cursor: pointer;
  display: inline-block;
  animation: bounce 2s infinite;
}

@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

.envelope-icon {
  font-size: 65px;
}

/* ⏳ Timer Style */
.timer-container {
  background: rgba(255, 255, 255, 0.2);
  padding: 12px;
  border-radius: 12px;
  margin: 15px 0;
  color: white;
  border: 1px solid rgba(255,255,255,0.1);
}

.timer-title {
  font-size: 13px;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 5px;
  opacity: 0.9;
}

.timer-display {
  font-size: 15px;
  font-weight: bold;
}

/* 📸 Image Block */
.photo-box {
  width: 100%;
  border-radius: 12px;
  margin-top: 15px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
  border: 2px solid white;
}

.typing {
  white-space: pre-wrap;
  display: inline-block;
  font-size: 18px;
  font-weight: bold;
  color: white;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="box">
  <div id="login-section">
    <h2>💌 Enter Password</h2>
    <input type="password" id="pass" placeholder="Enter password">
    <br>
    <button onclick="checkPass()">Open</button>
  </div>

  <div class="message-container" id="msg-container">
    <div class="envelope-wrapper" id="envelope" onclick="openLetter()">
      <div class="envelope-icon">✉️</div>
      <p style="color:white; font-size:14px; margin:5px 0 0 0;">နှိပ်ပြီး ဖွင့်ဖတ်ပါ 💖</p>
    </div>

    <div id="actual-content" style="display: none;">
      <h3>✨ Our Memories ✨</h3>
      
      <div class="timer-container">
        <div class="timer-title">💕 ချစ်သူသက်တမ်း 💕</div>
        <div id="timer" class="timer-display">Calculating...</div>
      </div>

      <div id="typing" class="typing"></div>

      <img src="IMG_20260121_210329_613.jpg" class="photo-box" alt="Our Special Memory">

      <br><br>
      <audio id="myAudio" loop>
        <source src="https://files.catbox.moe/n0ynm3.mp3" type="audio/mpeg">
      </audio>
    </div>
  </div>
</div>

<script>
let attempts = 0;
let heartInterval;

function checkPass() {
  let p = document.getElementById("pass").value.trim();

  if (p === "7.10.2024") { 
    document.getElementById("login-section").style.display = "none";
    document.getElementById("msg-container").style.display = "block";
    
    // 🎵 သီချင်းတန်းဖွင့်ခြင်း
    let audio = document.getElementById("myAudio");
    audio.play().catch(e => console.log("Auto-play blocked"));

  } else {
    attempts++;
    alert("Wrong password 💔");
    if (attempts >= 3) {
      alert("Too many attempts 😢");
      document.getElementById("pass").disabled = true;
    }
  }
}

// 💌 စာအိတ်ဖွင့်ချိန် လုပ်ဆောင်ချက်များ
function openLetter() {
  document.getElementById("envelope").style.display = "none";
  document.getElementById("actual-content").style.display = "block";
  
  // စာသား စရိုက်မည်
  typeText("အရမ်းချစ်တယ် သဲတုန်း ❤️");
  
  // Timer စတင်မည်
  startTimer();
  
  // 🎈 နှလုံးသားမိုးရွာမည့် စနစ်ပြောင်းမည်
  clearInterval(heartInterval);
  startFallingHearts();
}

// ⏳ Timer တွက်ချက်စနစ်
function startTimer() {
  const anniversary = new Date("2024-10-07T00:00:00").getTime();
  
  setInterval(() => {
    const now = new Date().getTime();
    const diff = now - anniversary;
    
    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((diff % (1000 * 60)) / 1000);
    
    document.getElementById("timer").innerHTML = 
      `${days} ရက်၊ ${hours} နာရီ၊ ${minutes} မိနစ်၊ ${seconds} စက္ကန့်`;
  }, 1000);
}

// ✍️ Typing effect
function typeText(text) {
  let i = 0;
  let el = document.getElementById("typing");
  el.innerHTML = ""; 
  function typing() {
    if (i < text.length) {
      el.innerHTML += text.charAt(i);
      i++;
      setTimeout(typing, 100);
    }
  }
  typing();
}

// 🎈 အောက်ကနေအပေါ်တက်မည့် နှလုံးသားများ
function startFloatingHearts() {
  heartInterval = setInterval(() => {
    createHeart("float-up", "💖");
  }, 600);
}
startFloatingHearts();

// 🌧 အပေါ်ကနေအောက်ကျမည့် နှလုံးသားများ (ကျကျချင်းကို ပိုနှေးအောင် ပြင်ထားပါတယ်)
function startFallingHearts() {
  setInterval(() => {
    createHeart("fall-down", "❤️");
    createHeart("fall-down", "💖");
  }, 500); // ကျတဲ့အကြိမ်ရေကိုလည်း ကျဲကျဲလေးပဲ ကျအောင် ထိန်းထားပါတယ်
}

function createHeart(className, symbol) {
  let heart = document.createElement("div");
  heart.className = `heart ${className}`;
  heart.innerHTML = symbol;
  heart.style.left = Math.random() * 100 + "vw";
  if(className === "fall-down") {
    heart.style.top = "-5vh";
    // ⏳ အသက်ဝင်လှုပ်ရှားမှု ကြာချိန်ကို ပိုရှည်စေပြီး ဖြည်းဖြည်းချင်းကျအောင် လုပ်ထားခြင်း
    heart.style.animationDuration = (Math.random() * 4 + 7) + "s";
  } else {
    heart.style.animationDuration = (Math.random() * 3 + 5) + "s";
  }
  heart.style.fontSize = Math.random() * 18 + 12 + "px";
  document.body.appendChild(heart);
  setTimeout(() => { heart.remove(); }, 9000);
}
</script>

</body>
</html>
