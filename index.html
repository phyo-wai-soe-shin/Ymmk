<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secret Love Page</title>

<style>
body { margin: 0; height: 100vh; overflow: hidden; display: flex; justify-content: center; align-items: center; font-family: Arial, sans-serif; background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fbc2eb); animation: bg 6s infinite alternate; }
@keyframes bg { 0% {filter: hue-rotate(0deg);} 100% {filter: hue-rotate(40deg);} }
.heart { position: absolute; color: rgba(255,255,255,0.7); z-index: 1; pointer-events: none; }

/* အသဲပုံလေးတွေ အောက်ကနေ အပေါ်ကို လွင့်တက်မည့် Animation */
.float-up { animation: floatUp 8s linear infinite; }
@keyframes floatUp { 0% {transform: translateY(110vh) rotate(0deg); opacity: 0;} 10% {opacity: 1;} 100% {transform: translateY(-10vh) rotate(360deg); opacity: 0;} }

.box { background: rgba(255,255,255,0.15); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); padding: 30px 20px; border-radius: 20px; text-align: center; width: 90%; max-width: 340px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); z-index: 10; border: 1px solid rgba(255,255,255,0.2); max-height: 85vh; overflow-y: auto; }
.box::-webkit-scrollbar { display: none; }
h2 { color: white; margin-top: 0; }
input { padding: 12px; width: 90%; border: none; border-radius: 10px; margin-top: 10px; text-align: center; font-size: 16px; outline: none; }
button { margin-top: 15px; padding: 10px 25px; border: none; border-radius: 10px; background: #ff4d6d; color: white; font-weight: bold; font-size: 16px; cursor: pointer; }
.message-container { display: none; margin-top: 15px; }
.envelope-wrapper { margin: 20px auto; cursor: pointer; animation: bounce 2s infinite; }
@keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
.timer-container { background: rgba(255, 255, 255, 0.2); padding: 10px; border-radius: 12px; margin: 15px 0; color: white; }
.photo-box { width: 100%; border-radius: 12px; margin-top: 15px; border: 2px solid white; display: block; }
.typing { white-space: pre-wrap; font-size: 18px; font-weight: bold; color: white; margin-top: 15px; margin-bottom: 15px; line-height: 1.6; text-align: center; }
</style>
</head>

<body>
<div class="box">
  <div id="login-section">
    <h2>💌 Enter Password</h2>
    <input type="password" id="pass" placeholder="Enter password">
    <br><button onclick="checkPass()">Open</button>
  </div>

  <div class="message-container" id="msg-container">
    <div class="envelope-wrapper" id="envelope" onclick="openLetter()">
      <div style="font-size:65px;">✉️</div>
      <p style="color:white; font-size:14px; margin:5px 0 0 0;">နှိပ်ပြီး ဖွင့်ဖတ်ပါ 💖</p>
    </div>

    <div id="actual-content" style="display: none;">
      <div class="timer-container">
        <div style="font-size:12px; opacity:0.9;">💕 ချစ်သူသက်တမ်း 💕</div>
        <div id="timer" style="font-size:14px; font-weight:bold;">Calculating...</div>
      </div>
      
      <div id="typing" class="typing"></div>

      <img src="IMG_20260121_210329_613.jpg" class="photo-box" alt="Our Memory">
      <audio id="myAudio" loop><source src="https://files.catbox.moe/n0ynm3.mp3" type="audio/mpeg"></audio>
    </div>
  </div>
</div>

<script>
const myLoveMessage = "အရမ်းချစ်တယ် သဲတုန်းလေး ❤️";

// Web Page စဖွင့်ကတည်းက အသဲပုံလေးတွေ တက်လာအောင် လုပ်ထားခြင်း
window.onload = function() {
  startFallingHearts();
};

function checkPass() {
  if (document.getElementById("pass").value.trim() === "7.10.2024") { 
    document.getElementById("login-section").style.display = "none";
    document.getElementById("msg-container").style.display = "block";
    document.getElementById("myAudio").play().catch(e => console.log(e));
  } else { alert("Wrong password 💔"); }
}

function openLetter() {
  document.getElementById("envelope").style.display = "none";
  document.getElementById("actual-content").style.display = "block";
  typeText(myLoveMessage);
  startTimer();
}

function typeText(text) {
  let i = 0;
  let el = document.getElementById("typing");
  el.innerHTML = ""; 
  function typing() {
    if (i < text.length) {
      el.innerHTML += text.charAt(i);
      i++;
      setTimeout(typing, 120); 
    }
  }
  typing();
}

function startTimer() {
  setInterval(() => {
    const diff = new Date() - new Date("2024-10-07T00:00:00");
    const d = Math.floor(diff / 86400000);
    const h = Math.floor((diff % 86400000) / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    const s = Math.floor((diff % 60000) / 1000);
    document.getElementById("timer").innerHTML = `${d} ရက်၊ ${h} နာရီ၊ ${m} မိနစ်၊ ${s} စက္ကန့်`;
  }, 1000);
}

// အောက်ခြေကနေ အပေါ်ကို ပျံတက်မည့် အသဲပုံ Function
function startFallingHearts() {
  setInterval(() => {
    let h = document.createElement("div");
    h.className = "heart float-up"; // class name ပြောင်းလဲထားပါတယ်
    h.innerHTML = Math.random() > 0.5 ? "❤️" : "💖";
    h.style.left = Math.random() * 100 + "vw";
    h.style.top = "100vh"; // အောက်ခြေကနေ စပွင့်အောင် လုပ်ထားပါတယ်
    h.style.animationDuration = (Math.random() * 4 + 6) + "s";
    document.body.appendChild(h);
    setTimeout(() => h.remove(), 9000);
  }, 600);
}
</script>
</body>
</html>
