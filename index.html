<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secret Letter</title>
</head>
<!-- နောက်ခံကို မျက်စိအေးစေမယ့် မိုးပြာရောင်/အပြာနုရောင်စပ်ကြား (Sky Blue Gradient) အသေအချာ ပြောင်းပေးထားပါတယ် -->
<body style="text-align:center; font-family:Arial, sans-serif; background: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 100%); background-attachment: fixed; min-height: 100vh; margin: 0; padding-top: 50px;">

<h2>Enter Password</h2>

<input type="text" id="pw" placeholder="ရက်စွဲရိုက်ထည့်ပါ" style="padding: 5px; font-size: 16px;">
<button onclick="check()" style="padding: 5px 10px; font-size: 16px;">Open</button>

<div id="letter" style="display:none; margin-top:20px;">
  <h3>💌 Secret Message</h3>
  <p style="font-size: 18px; font-weight: bold; color: #0369a1;">
    ဒီအရမ်းချစ်တယ် သဲတုန်းလေး
  </p>
</div>

<script>
function check(){
  var pass = document.getElementById("pw").value.trim();

  if(pass === "7.10.2024"){   
    document.getElementById("letter").style.display = "block";
  } else {
    alert("Wrong password");
  }
}
</script>

</body>
</html>
