<!DOCTYPE html>
<html>
<head>
  <title>Secret Letter</title>
</head>
<!-- ဒီမှာ Background အရောင်ပြေးလှလှလေး ပြောင်းလဲထားပါတယ် -->
<body style="text-align:center; font-family:Arial, sans-serif; background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); height: 100vh; margin: 0; padding-top: 50px;">

<h2>Enter Password</h2>

<input type="password" id="pw">
<button onclick="check()">Open</button>

<div id="letter" style="display:none; margin-top:20px;">
  <h3>💌 Secret Message</h3>
  <p>
    အရမ်းချစ်တယ် ယွန်းမီမီကို
  </p>

  <!-- စကားဝှက်မှန်မှ သီချင်းဖွင့်စနစ် ပေါ်လာစေမယ့်နေရာ -->
  <div style="margin-top: 20px;">
    <audio controls autoplay loop>
      <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
      သင့် Browser က သီချင်းဖွင့်စနစ်ကို အထောက်အပံ့မပြုပါ။
    </audio>
  </div>
</div>

<script>
function check(){
  var pass = document.getElementById("pw").value;

  // သတိပြုရန် - Password ကို မျက်တောင်ဖွင့်ပိတ် (" ") ထဲ ထည့်ပေးရပါမယ်
  if(pass == "7.10.2024"){   
    document.getElementById("letter").style.display = "block";
  } else {
    alert("Wrong password");
  }
}
</script>

</body>
</html>
