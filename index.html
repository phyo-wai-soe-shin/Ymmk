<!DOCTYPE html>
<html>
<head>
  <title>Secret Letter</title>
</head>
<!-- နောက်ခံကို ပန်းရောင်နုနုနဲ့ ခရမ်းနုရောင်စပ်ကြား အရောင်ပြေး (Gradient) လှလှလေး ပြောင်းပေးထားပါတယ် -->
<body style="text-align:center; font-family:Arial, sans-serif; background: linear-gradient(135deg, #fff5f5 0%, #e8dbfc 100%); height: 100vh; margin: 0; padding-top: 50px;">

<h2>Enter Password</h2>

<!-- စာရိုက်ရ ပိုအဆင်ပြေအောင် type="text" ပြောင်းထားပြီး placeholder ထည့်ပေးထားပါတယ် -->
<input type="text" id="pw" placeholder="ရက်စွဲရိုက်ထည့်ပါ">
<button onclick="check()">Open</button>

<div id="letter" style="display:none; margin-top:20px;">
  <h3>💌 Secret Message</h3>
  <p>
    ဒီအရမ်းချစ်တယ် သဲတုန်းလေး
  </p>
</div>

<script>
function check(){
  // ရိုက်ထည့်တဲ့အခါ အရှေ့အနောက် space ပါသွားရင် အလိုအလျောက် ဖြတ်ပေးမယ့်စနစ် ထည့်ထားပါတယ်
  var pass = document.getElementById("pw").value.trim();

  // Password ကတော့ အစ်ကို သတ်မှတ်ထားတဲ့အတိုင်း "7.10.2024" ပါပဲဗျာ
  if(pass === "7.10.2024"){   
    document.getElementById("letter").style.display = "block";
  } else {
    alert("Wrong password");
  }
}
</script>

</body>
</html>
