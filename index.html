<!DOCTYPE html>
<html>
<head>
  <title>Secret Letter</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial;

      /* 🌌 Background */
      background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #1b1b2f);
      background-size: 400% 400%;
      animation: gradient 10s ease infinite;
      color: white;
      text-align: center;
    }

    @keyframes gradient {
      0% {background-position:0% 50%;}
      50% {background-position:100% 50%;}
      100% {background-position:0% 50%;}
    }

    .box {
      background: rgba(255,255,255,0.08);
      padding: 30px;
      border-radius: 15px;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    input {
      padding: 10px;
      border: none;
      border-radius: 8px;
      outline: none;
      margin-top: 10px;
    }

    button {
      padding: 10px 15px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    #letter {
      display: none;
      margin-top: 20px;
      font-size: 18px;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>💌 Enter Password</h2>

  <input type="password" id="pw"><br>
  <button onclick="check()">Open</button>

  <div id="letter">
    <h3>✨ Secret Message</h3>
    <p>
      အရမ်းချစ်တယ် သဲတုန်း
    </p>
  </div>
</div>

<script>
function check(){
  var pass = document.getElementById("pw").value;

  if(pass == "7.10.2024"){
    document.getElementById("letter").style.display = "block";
  } else {
    alert("Wrong password");
  }
}
</script>

</body>
</html>
