<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secret Love Page</title>

<style>
body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fbc2eb);
  animation: bg 6s infinite alternate;
}

@keyframes bg {
  0% {filter: hue-rotate(0deg);}
  100% {filter: hue-rotate(40deg);}
}

/* floating hearts */
.heart {
  position: absolute;
  color: rgba(255,255,255,0.7);
  animation: float 6s linear infinite;
}

@keyframes float {
  0% {transform: translateY(100vh) scale(0.5);}
  100% {transform: translateY(-10vh) scale(1.2);}
}

.box {
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  padding: 30px;
  border-radius: 20px;
  text-align: center;
  width: 320px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  z-index: 10;
}

h2 {color: white;}

input {
  padding: 10px;
  width: 90%;
  border: none;
  border-radius: 10px;
  margin-top: 10px;
  text-align: center;
}

button {
  margin-top: 15px;
  padding: 10px 20px;
  border: none;
  border-radius: 10px;
  background: #ff4d6d;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

.message {
  display: none;
  margin-top: 15px;
  color: white;
  font-size: 18px;
}

.typing {
  white-space: pre-wrap;
  display: inline-block;
}
</style>
</head>

<body>

<div class="box">
  <h2>💌 Enter Password</h2>
  <input type="password" id="pass" placeholder="Enter password">
  <br>
  <button onclick="checkPass()">Open</button>

  <div class="message" id="msg">
    <h3>✨ Secret Message</h3>
    <div id="typing" class="typing"></div>

    <br><br>

    <!-- 🎧 အစ်ကိုပေးထားတဲ့ သီချင်းလင့်ခ်ကို ကွက်တိထည့်ပေးထားပါတယ် -->
    <audio id="myAudio" loop>
      <source src="https://files.catbox.moe/n0ynm3.mp3" type="audio/mpeg">
      သင့် Browser က သီချင်းဖွင့်စနစ်ကို အထောက်အပံ့မပြုပါ။
    </audio>
  </div>
</div>

<script>
let attempts = 0;

function checkPass() {
  let p = document.getElementById("pass").value.trim();

  // စကားဝှက်ကို 7.10.2024 လို့ ထည့်သွင်းထားပါတယ်
  if (p === "7.10.2024") { 
    document.getElementById("msg").style.display = "block";
    typeText("အရမ်းချစ်တယ် သဲတုန်း ❤️");
    
    // Password မှန်တာနဲ့ သီချင်းတန်းပွင့်မယ့်စနစ်
    let audio = document.getElementById("myAudio");
    audio.play().catch(function(error) {
       console.log("Auto-play blocked", error);
    });

  } else {
    attempts++;
    alert("Wrong password 💔");

    if (attempts >= 3) {
      alert("Too many attempts 😢");
      document.getElementById("pass").disabled = true;
    }
  }
}

// typing effect
function typeText(text) {
  let i = 0;
  let el = document.getElementById("typing");
  el.innerHTML = ""; 

  function typing() {
    if (i < text.length) {
      el.innerHTML += text.charAt(i);
      i++;
      setTimeout(typing, 100);
    }
  }
  typing();
}

// floating hearts generator
setInterval(() => {
  let heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "💖";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = Math.random() * 20 + 10 + "px";
  heart.style.animationDuration = (Math.random() * 3 + 3) + "s";

  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 6000);
}, 300);
</script>

</body>
</html>
